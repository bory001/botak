<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>보탁 스코어보드</title>
<!-- GitHub: bory001/botak → https://bory001.github.io/botak/ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
  :root {
    --p1: #f5a400;
    --p2: #1d72b8;
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #252530;
    --text: #f0f0f5;
    --muted: #5a5a72;
    --gold: #f4c430;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* TOP BAR */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 12px; background: var(--surface);
    border-bottom: 1px solid var(--border); gap: 6px; flex-wrap: wrap; flex-shrink: 0;
  }
  .topbar-title { font-size: 0.95rem; font-weight: 900; letter-spacing: 1px; color: var(--gold); }

  /* 경기 선택 셀렉트 */
  #matchSelect {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--p1);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 8px;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
    min-width: 72px;
    transition: border-color .2s;
  }
  #matchSelect:focus { border-color: var(--p1); }
  .topbar-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .format-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.72rem; font-weight: 700;
    padding: 4px 10px; border-radius: 16px; cursor: pointer; transition: all .2s;
  }
  .format-btn.active { background: var(--gold); border-color: var(--gold); color: #000; }

  /* 자리바꿈 토글 */
  .swap-toggle { display: flex; align-items: center; gap: 5px; cursor: pointer; }
  .toggle-track {
    width: 32px; height: 18px; background: var(--border); border-radius: 9px;
    position: relative; transition: background .2s; flex-shrink: 0;
  }
  .toggle-track.on { background: var(--p1); }
  .toggle-thumb {
    width: 14px; height: 14px; background: #fff; border-radius: 50%;
    position: absolute; top: 2px; left: 2px; transition: left .2s;
  }
  .toggle-track.on .toggle-thumb { left: 16px; }
  .swap-label { font-size: 0.68rem; font-weight: 700; color: var(--muted); white-space: nowrap; }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; flex-shrink: 0; }
  .status-dot.online { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }

  /* NAMES */
  .names-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); flex-shrink: 0; }
  .name-cell { padding: 6px 12px; background: var(--surface); }
  .name-input {
    width: 100%; background: transparent; border: none;
    border-bottom: 2px solid var(--border); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.92rem; font-weight: 700;
    text-align: center; padding: 2px 0; outline: none;
  }
  .name-cell.col-left  .name-input { color: var(--p1); border-bottom-color: var(--p1); }
  .name-cell.col-right .name-input { color: var(--p2); border-bottom-color: var(--p2); }

  /* SET ROW */
  .set-row {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    padding: 4px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
    gap: 6px; flex-shrink: 0;
  }
  .set-score { font-size: 1.8rem; font-weight: 900; text-align: center; line-height: 1; }
  .set-score.col-left  { color: var(--p1); }
  .set-score.col-right { color: var(--p2); }
  .set-label { font-size: 0.6rem; color: var(--muted); text-align: center; font-weight: 700; letter-spacing: 1px; }
  .set-pips { display: flex; gap: 4px; justify-content: center; margin-top: 3px; }
  .pip { width: 9px; height: 9px; border-radius: 50%; border: 2px solid var(--muted); transition: all .25s; }
  .pip.col-left  { background: var(--p1); border-color: var(--p1); }
  .pip.col-right { background: var(--p2); border-color: var(--p2); }

  /* MATCH STATUS */
  .match-status {
    text-align: center; font-size: 0.7rem; font-weight: 900; letter-spacing: 2px;
    padding: 4px 8px; min-height: 22px; flex-shrink: 0; transition: all .3s;
  }
  .match-status.deuce    { color: var(--gold); background: rgba(244,196,48,0.07); }
  .match-status.mp-left  { color: var(--p1);   background: rgba(255,107,0,0.07); }
  .match-status.mp-right { color: var(--p2);   background: rgba(29,114,184,0.07); }

  /* SCORE AREA */
  .score-area {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--border); flex: 1; min-height: 0;
  }
  .score-panel {
    background: var(--surface); display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative;
    cursor: pointer; transition: background .25s; overflow: hidden;
    -webkit-touch-callout: none;
  }
  .score-panel.serve-active { background: #141208; }
  .serve-indicator { position: absolute; top: 8px; font-size: 1rem; opacity: 0; transition: opacity .3s; pointer-events: none; }
  .serve-active .serve-indicator { opacity: 1; }

  .score-number {
    font-size: clamp(6rem, 28vw, 14rem);
    font-weight: 900; line-height: 1;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
  }
  .score-panel.col-left  .score-number { color: var(--p1); }
  .score-panel.col-right .score-number { color: var(--p2); }

  .score-number.bump      { animation: bump .14s ease-out; }
  .score-number.minus-bump{ animation: mbump .14s ease-out; }
  @keyframes bump  { 0%{transform:scale(1)} 50%{transform:scale(1.14)} 100%{transform:scale(1)} }
  @keyframes mbump { 0%{transform:scale(1)} 50%{transform:scale(0.88)} 100%{transform:scale(1)} }

  .touch-hint {
    position: absolute; bottom: 7px; font-size: 0.58rem; color: var(--muted);
    letter-spacing: 1px; font-weight: 700; pointer-events: none;
  }

  /* 길게누르기 링 */
  .lp-ring {
    position: absolute; width: 72px; height: 72px; border-radius: 50%;
    border: 3px solid transparent; pointer-events: none;
  }
  .score-panel.col-left  .lp-ring { border-color: var(--p1); }
  .score-panel.col-right .lp-ring { border-color: var(--p2); }
  .lp-ring.go { animation: lpRing .65s linear forwards; }
  @keyframes lpRing {
    from { transform:scale(.5); opacity:.8; }
    to   { transform:scale(1.6); opacity:0; }
  }

  /* Ripple */
  .rpl {
    position: absolute; border-radius: 50%;
    transform: scale(0); animation: rplA .5s ease-out forwards; pointer-events: none;
  }
  .score-panel.col-left  .rpl { background: rgba(255,107,0,0.15); }
  .score-panel.col-right .rpl { background: rgba(29,114,184,0.15); }
  @keyframes rplA { to { transform:scale(5); opacity:0; } }

  /* SERVE ROW */
  .serve-row {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    padding: 6px 12px; gap: 8px; background: var(--surface);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .serve-btn {
    background: var(--surface2); border: 2px solid var(--border); color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.73rem; font-weight: 700;
    padding: 7px 10px; border-radius: 8px; cursor: pointer; transition: all .2s; text-align: center;
  }
  .serve-btn.act-left  { background:rgba(255,107,0,.12); border-color:var(--p1); color:var(--p1); }
  .serve-btn.act-right { background:rgba(29,114,184,.12); border-color:var(--p2); color:var(--p2); }
  .serve-center { font-size: 0.58rem; color: var(--muted); text-align: center; font-weight: 700; }

  /* ACTION ROW */
  .action-row {
    display: flex; gap: 6px; padding: 6px 10px; background: var(--surface2);
    border-top: 1px solid var(--border); flex-wrap: wrap; justify-content: center; flex-shrink: 0;
  }
  .action-btn {
    flex: 1; min-width: 68px; background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); font-family: 'Noto Sans KR', sans-serif; font-size: 0.7rem; font-weight: 700;
    padding: 7px 8px; border-radius: 7px; cursor: pointer; transition: all .2s; text-align: center;
  }
  .action-btn.danger  { color:#c0392b; border-color:rgba(192,57,43,.3); }
  .action-btn.primary { color:var(--gold); border-color:rgba(244,196,48,.3); }
  .action-btn:active  { filter: brightness(1.4); }

  /* HISTORY */
  .history-panel { max-height:0; overflow:hidden; transition:max-height .35s ease; background:var(--surface); border-top:1px solid var(--border); flex-shrink:0; }
  .history-panel.open { max-height:200px; overflow-y:auto; }
  .history-inner { padding: 10px 14px; }
  .history-title { font-size:.63rem; color:var(--muted); letter-spacing:2px; font-weight:700; margin-bottom:8px; }
  .history-item { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--border); font-size:.78rem; }
  .history-item:last-child { border-bottom:none; }
  .h-set  { font-weight:900; color:var(--gold); font-size:.68rem; width:36px; }
  .h-sc   { font-weight:900; font-size:.95rem; }
  .h-col1 { color:var(--p1); }
  .h-col2 { color:var(--p2); }
  .h-win  { font-size:.66rem; color:var(--muted); margin-left:auto; }

  /* SET END OVERLAY */
  .setend-ov {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.82); z-index:90;
    align-items:center; justify-content:center; flex-direction:column; gap:12px; backdrop-filter:blur(8px);
  }
  .setend-ov.show { display:flex; }
  .setend-title  { font-size:1.9rem; font-weight:900; color:var(--gold); letter-spacing:2px; }
  .setend-scores { display:flex; align-items:center; gap:14px; font-size:3rem; font-weight:900; }
  .setend-winner { font-size:.82rem; color:var(--muted); font-weight:700; }
  .swap-notice   { font-size:.75rem; color:var(--gold); font-weight:700; letter-spacing:1px; opacity:0; transition:opacity .3s; }
  .swap-notice.visible { opacity:1; }
  .setend-btn {
    background:var(--gold); color:#000; border:none;
    font-family:'Noto Sans KR',sans-serif; font-weight:900; font-size:.92rem;
    padding:12px 30px; border-radius:40px; cursor:pointer; margin-top:6px;
  }

  /* WINNER OVERLAY */
  .win-ov {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:100;
    align-items:center; justify-content:center; flex-direction:column; gap:14px; backdrop-filter:blur(10px);
  }
  .win-ov.show { display:flex; }
  .win-trophy { font-size:3.5rem; animation:tPop .5s ease-out; }
  @keyframes tPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 60%{transform:scale(1.2) rotate(5deg)} 100%{transform:scale(1);opacity:1} }
  .win-name { font-size:clamp(2rem,10vw,4rem); font-weight:900; letter-spacing:2px; text-align:center; }
  .win-name.col-left  { color:var(--p1); text-shadow:0 0 30px rgba(255,107,0,.5); }
  .win-name.col-right { color:var(--p2); text-shadow:0 0 30px rgba(29,114,184,.5); }
  .win-sub { color:var(--muted); font-size:.82rem; font-weight:700; }
  .win-btn {
    background:var(--gold); color:#000; border:none;
    font-family:'Noto Sans KR',sans-serif; font-weight:900; font-size:.92rem;
    padding:12px 30px; border-radius:40px; cursor:pointer; margin-top:8px;
  }

  /* TOAST */
  .toast {
    position:fixed; bottom:14px; left:50%;
    transform:translateX(-50%) translateY(60px);
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:7px 16px; border-radius:22px; font-size:.75rem; font-weight:700;
    transition:transform .3s; z-index:200; white-space:nowrap;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* ── 세로모드: 래퍼 투명 ── */
  @media (orientation: portrait) {
    .sidebar    { display: contents; }
    .score-main { display: contents; }
    /* 가로모드용 matchStatus 세로모드엔 숨김 */
    #matchStatus { display: none; }
  }
  /* 세로모드엔 사이드바 matchStatus 표시 */
  @media (orientation: portrait) {
    #matchStatusSide { display: block; }
  }

  /* ── 태블릿 세로 ── */
  @media (min-width: 600px) and (orientation: portrait) {
    .score-number { font-size: clamp(8rem, 22vw, 16rem); }
    .topbar-title { font-size: 1.1rem; }
    .set-score { font-size: 2.4rem; }
    .serve-btn { font-size: 0.88rem; padding: 10px 16px; }
    .action-btn { font-size: 0.82rem; padding: 10px 12px; }
  }

  /* ── 태블릿/폰 가로 모드 ── */
  @media (orientation: landscape) {
    body { flex-direction: row; max-width: 100%; overflow: hidden; }

    .sidebar {
      display: flex;
      flex-direction: column;
      width: 210px;
      min-width: 170px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      height: 100dvh;
      overflow-y: auto;
    }
    .score-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      min-width: 0;
    }

    .topbar {
      flex-direction: column;
      align-items: flex-start;
      padding: 8px 12px;
    }
    .topbar-right { width: 100%; justify-content: flex-start; }

    .names-row { grid-template-columns: 1fr; }
    .name-cell { padding: 5px 12px; }

    .score-area { flex: 1; min-height: 0; }
    .score-number { font-size: clamp(4rem, 18vh, 13rem); }

    /* 사이드바 matchStatus 가로모드엔 숨김 */
    #matchStatusSide { display: none; }
    /* 메인 matchStatus 가로모드엔 표시 */
    #matchStatus { display: block; }
  }

  /* 가로 대형 태블릿 */
  @media (orientation: landscape) and (min-width: 900px) {
    .sidebar { width: 250px; }
    .score-number { font-size: clamp(6rem, 22vh, 17rem); }
    .set-score { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<!-- 가로모드: .sidebar + .score-main 으로 분리 -->
<!-- 세로모드: 모두 body 직계 flow -->

<!-- ★ SIDEBAR (가로모드에선 왼쪽 컬럼) -->
<div class="sidebar">

<!-- TOP BAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="topbar-title">🏓 보탁 스코어보드</div>
    <select id="matchSelect" onchange="switchMatch(this.value)">
      <option value="match01">경기 01</option>
      <option value="match02">경기 02</option>
      <option value="match03">경기 03</option>
      <option value="match04">경기 04</option>
      <option value="match05">경기 05</option>
      <option value="match06">경기 06</option>
      <option value="match07">경기 07</option>
      <option value="match08">경기 08</option>
      <option value="match09">경기 09</option>
      <option value="match10">경기 10</option>
    </select>
  </div>
  <div class="topbar-right">
    <button class="format-btn active" id="btn5" onclick="setFormat(5)">5판</button>
    <button class="format-btn" id="btn3" onclick="setFormat(3)">3판</button>
    <div class="swap-toggle" onclick="toggleSwap()">
      <div class="toggle-track on" id="swapTrack"><div class="toggle-thumb"></div></div>
      <span class="swap-label">자리바꿈</span>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>
</div>

<!-- NAMES -->
<div class="names-row">
  <div class="name-cell col-left" id="nc1">
    <input class="name-input" id="nameL" value="선수 1" maxlength="8" oninput="saveNames()">
  </div>
  <div class="name-cell col-right" id="nc2">
    <input class="name-input" id="nameR" value="선수 2" maxlength="8" oninput="saveNames()">
  </div>
</div>

<!-- SET ROW -->
<div class="set-row">
  <div style="text-align:center">
    <div class="set-score col-left" id="setsL">0</div>
    <div class="set-pips" id="pipsL"></div>
  </div>
  <div class="set-label">세트<br>획득</div>
  <div style="text-align:center">
    <div class="set-score col-right" id="setsR">0</div>
    <div class="set-pips" id="pipsR"></div>
  </div>
</div>

<!-- MATCH STATUS (세로모드용 - 가로모드는 score-main 안에) -->
<div class="match-status" id="matchStatusSide"></div>

<!-- SERVE ROW -->
<div class="serve-row">
  <button class="serve-btn" id="sbL" onclick="setServeByPanel('L')">🏓 서브</button>
  <div class="serve-center">서브권</div>
  <button class="serve-btn" id="sbR" onclick="setServeByPanel('R')">서브 🏓</button>
</div>

<!-- ACTIONS -->
<div class="action-row">
  <button class="action-btn primary" onclick="toggleHistory()">📋 기록</button>
  <button class="action-btn" onclick="manualNextSet()">다음 세트 ▶</button>
  <button class="action-btn danger" onclick="resetGame()">↺ 초기화</button>
</div>

<!-- HISTORY -->
<div class="history-panel" id="historyPanel">
  <div class="history-inner">
    <div class="history-title">경기 기록</div>
    <div id="historyList"></div>
  </div>
</div>

</div><!-- /sidebar -->

<!-- ★ SCORE MAIN (가로모드에선 오른쪽 메인) -->
<div class="score-main">

<!-- MATCH STATUS (가로모드용) -->
<div class="match-status" id="matchStatus"></div>

<!-- SCORE AREA -->
<div class="score-area">
  <div class="score-panel col-left" id="panelL">
    <span class="serve-indicator" id="siL">🏓</span>
    <div class="lp-ring" id="ringL"></div>
    <div class="score-number" id="scoreL">0</div>
    <div class="touch-hint">터치 +1 &nbsp;|&nbsp; 길게누르기 −1</div>
  </div>
  <div class="score-panel col-right" id="panelR">
    <span class="serve-indicator" id="siR">🏓</span>
    <div class="lp-ring" id="ringR"></div>
    <div class="score-number" id="scoreR">0</div>
    <div class="touch-hint">터치 +1 &nbsp;|&nbsp; 길게누르기 −1</div>
  </div>
</div>

</div><!-- /score-main -->

<!-- SET END OVERLAY -->
<div class="setend-ov" id="setendOv">
  <div class="setend-title" id="seTitle">세트 종료</div>
  <div class="setend-scores">
    <span id="seScL" class="h-col1">0</span>
    <span style="color:var(--muted)">:</span>
    <span id="seScR" class="h-col2">0</span>
  </div>
  <div class="setend-winner" id="seWinner"></div>
  <div class="swap-notice" id="swapNotice">⇄ 좌우 자리가 바뀝니다</div>
  <button class="setend-btn" onclick="confirmNextSet()">다음 세트 시작 →</button>
</div>

<!-- WINNER OVERLAY -->
<div class="win-ov" id="winOv">
  <div class="win-trophy">🏆</div>
  <div class="win-name col-left" id="winName">선수 1</div>
  <div class="win-sub" id="winSub">경기 종료</div>
  <button class="win-btn" onclick="resetGame()">새 경기 시작</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── FIREBASE ──────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCitGkZcA9rop79BtXJzTBFeez05EYhDoM",
  authDomain: "reservation-928c2.firebaseapp.com",
  databaseURL: "https://reservation-928c2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "reservation-928c2",
  storageBucket: "reservation-928c2.appspot.com",
  messagingSenderId: "1234567890",
  appId: "reservation-928c2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const dot = document.getElementById('statusDot');
db.ref('.info/connected').on('value', s => dot.classList.toggle('online', !!s.val()));

// ── 경기 선택 ──────────────────────────────────────────
let currentMatch = 'match01';
let gameRef = null;
let firebaseListener = null;

function defaultState() {
  return {
    score1:0, score2:0, sets1:0, sets2:0,
    serve:1, format:5, currentSet:1, history:[],
    p1name:'선수 1', p2name:'선수 2',
    locked:false, autoSwap:true, leftPlayer:1
  };
}

function switchMatch(matchId) {
  currentMatch = matchId;
  // 이전 리스너 해제
  if (gameRef && firebaseListener) {
    gameRef.off('value', firebaseListener);
  }
  // 새 경로로 ref 변경
  gameRef = db.ref('pingpong/botak/' + matchId);
  state = defaultState();
  render();
  // 새 리스너 등록
  firebaseListener = gameRef.on('value', snap => {
    const d = snap.val();
    if (d) { state = d; render(); }
    else { state = defaultState(); render(); }
  });
  // 선택박스 동기화
  document.getElementById('matchSelect').value = matchId;
}

// 초기 경기 연결
switchMatch('match01');

// ── STATE & PUSH ───────────────────────────────────────
let state = defaultState();
function push() { if(gameRef) gameRef.set(state).catch(console.warn); }

// ── RENDER ─────────────────────────────────────────────
function render() {
  const lp = state.leftPlayer || 1;
  const rp = lp===1 ? 2 : 1;
  const lScore = lp===1 ? state.score1 : state.score2;
  const rScore = rp===1 ? state.score1 : state.score2;
  const lSets  = lp===1 ? state.sets1  : state.sets2;
  const rSets  = rp===1 ? state.sets1  : state.sets2;
  const lName  = lp===1 ? state.p1name : state.p2name;
  const rName  = rp===1 ? state.p1name : state.p2name;

  // 이름 입력창
  document.getElementById('nameL').value = lName;
  document.getElementById('nameR').value = rName;

  // 점수
  document.getElementById('scoreL').textContent = lScore;
  document.getElementById('scoreR').textContent = rScore;

  // 세트
  document.getElementById('setsL').textContent = lSets;
  document.getElementById('setsR').textContent = rSets;

  // 파이프
  const toWin = Math.ceil(state.format/2);
  renderPips('pipsL', lSets, toWin, 'col-left');
  renderPips('pipsR', rSets, toWin, 'col-right');

  // 포맷 버튼
  document.getElementById('btn5').classList.toggle('active', state.format===5);
  document.getElementById('btn3').classList.toggle('active', state.format===3);

  // 자리바꿈 토글
  document.getElementById('swapTrack').classList.toggle('on', !!state.autoSwap);

  // 서브
  const lServe = state.serve === lp;
  const rServe = state.serve === rp;
  document.getElementById('panelL').classList.toggle('serve-active', lServe);
  document.getElementById('panelR').classList.toggle('serve-active', rServe);
  document.getElementById('siL').style.opacity = lServe ? '1' : '0';
  document.getElementById('siR').style.opacity = rServe ? '1' : '0';
  document.getElementById('sbL').className = 'serve-btn' + (lServe ? ' act-left'  : '');
  document.getElementById('sbR').className = 'serve-btn' + (rServe ? ' act-right' : '');

  updateMatchStatus(lScore, rScore, lSets, rSets, lName, rName, toWin);
  renderHistory();
}

function renderPips(id, filled, total, cls) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  for(let i=0;i<total;i++){
    const p=document.createElement('div');
    p.className='pip'+(i<filled?' '+cls:'');
    el.appendChild(p);
  }
}

function updateMatchStatus(ls, rs, lsets, rsets, lname, rname, toWin) {
  ['matchStatus','matchStatusSide'].forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    if(ls>=10 && rs>=10){
      const d=Math.abs(ls-rs);
      if(d===0){el.textContent='DEUCE';el.className='match-status deuce';return;}
      if(d===1){
        el.textContent='ADVANTAGE — '+(ls>rs?lname:rname);
        el.className='match-status '+(ls>rs?'mp-left':'mp-right');return;
      }
    }
    if(lsets===toWin-1&&ls>=10&&ls>rs){el.textContent='MATCH POINT — '+lname;el.className='match-status mp-left';return;}
    if(rsets===toWin-1&&rs>=10&&rs>ls){el.textContent='MATCH POINT — '+rname;el.className='match-status mp-right';return;}
    if(ls>=10&&ls>rs){el.textContent='SET POINT — '+lname;el.className='match-status mp-left';return;}
    if(rs>=10&&rs>ls){el.textContent='SET POINT — '+rname;el.className='match-status mp-right';return;}
    el.textContent='';el.className='match-status';
  });
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if(!state.history||!state.history.length){
    list.innerHTML='<div style="color:var(--muted);font-size:.76rem;padding:6px 0">기록 없음</div>';return;
  }
  // 히스토리는 선수1/선수2 기준으로 저장됨
  list.innerHTML = state.history.map(h=>`
    <div class="history-item">
      <span class="h-set">SET ${h.set}</span>
      <span class="h-sc h-col1">${h.s1}</span>
      <span style="color:var(--muted)">:</span>
      <span class="h-sc h-col2">${h.s2}</span>
      <span class="h-win">🏆 ${h.winner}</span>
    </div>`).join('');
}

// ── TOUCH CONTROLS ─────────────────────────────────────
const LONG_MS = 600;
let lpTimer = null;

function setupPanel(panelId, ringId, side) {
  const panel = document.getElementById(panelId);
  const ring  = document.getElementById(ringId);

  panel.addEventListener('pointerdown', e => {
    if(state.locked) return;
    e.preventDefault();
    addRipple(panel, e);
    // 링 시작
    ring.classList.remove('go'); void ring.offsetWidth; ring.classList.add('go');

    lpTimer = setTimeout(()=>{
      lpTimer = null;
      if(!state.locked){ subtractSide(side); flashRing(ring); }
    }, LONG_MS);
  });

  panel.addEventListener('pointerup', ()=>{
    if(lpTimer!==null){
      clearTimeout(lpTimer); lpTimer=null;
      ring.classList.remove('go');
      if(!state.locked) addSide(side);
    }
  });
  panel.addEventListener('pointercancel', ()=>{
    clearTimeout(lpTimer); lpTimer=null; ring.classList.remove('go');
  });
  panel.addEventListener('contextmenu', e=>e.preventDefault());
}

setupPanel('panelL','ringL','L');
setupPanel('panelR','ringR','R');

function flashRing(ring){ ring.classList.remove('go'); void ring.offsetWidth; ring.classList.add('go'); }

function panelToPlayer(side){
  const lp=state.leftPlayer||1;
  return side==='L' ? lp : (lp===1?2:1);
}

function addSide(side){
  const p=panelToPlayer(side);
  if(p===1) state.score1++; else state.score2++;
  bump(side, false); autoServe(); checkSetWin(); push();
}
function subtractSide(side){
  const p=panelToPlayer(side);
  if(p===1&&state.score1>0) state.score1--;
  else if(p===2&&state.score2>0) state.score2--;
  bump(side, true); push();
}

function addRipple(panel, e){
  const r=document.createElement('div'); r.className='rpl';
  const rect=panel.getBoundingClientRect(), sz=Math.max(rect.width,rect.height);
  r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
  panel.appendChild(r); setTimeout(()=>r.remove(),600);
}

// ── SERVE AUTO ─────────────────────────────────────────
function autoServe(){
  const total=state.score1+state.score2;
  const deuce=state.score1>=10&&state.score2>=10;
  const ss=getStartServer();
  if(deuce) state.serve=(total%2===0)?ss:(ss===1?2:1);
  else { const b=Math.floor(total/2); state.serve=(b%2===0)?ss:(ss===1?2:1); }
}
function getStartServer(){ return ((state.currentSet-1)%2===0)?1:2; }

// ── SET WIN ────────────────────────────────────────────
function checkSetWin(){
  const s1=state.score1, s2=state.score2;
  const p1w=s1>=11&&s1-s2>=2, p2w=s2>=11&&s2-s1>=2;
  if(!p1w&&!p2w) return;
  const winner=p1w?1:2;
  if(winner===1) state.sets1++; else state.sets2++;
  if(!state.history) state.history=[];
  state.history.push({set:state.currentSet, s1:state.score1, s2:state.score2,
    winner:winner===1?state.p1name:state.p2name});
  const toWin=Math.ceil(state.format/2);
  if(state.sets1>=toWin||state.sets2>=toWin){
    state.locked=true; push(); showWinner(winner); return;
  }
  push(); showSetEnd(winner);
}

// ── SET END ────────────────────────────────────────────
function showSetEnd(winner){
  const lp=state.leftPlayer||1;
  const lScore=lp===1?state.score1:state.score2;
  const rScore=lp===1?state.score2:state.score1;
  document.getElementById('seTitle').textContent=`SET ${state.currentSet} 종료`;
  document.getElementById('seScL').textContent=lScore;
  document.getElementById('seScR').textContent=rScore;
  const wName=winner===1?state.p1name:state.p2name;
  const wCol=winner===lp?'var(--p1)':'var(--p2)';
  document.getElementById('seWinner').innerHTML=
    `<span style="color:${wCol};font-weight:900">${wName}</span> 세트 획득`;
  document.getElementById('swapNotice').classList.toggle('visible',!!state.autoSwap);
  document.getElementById('setendOv').classList.add('show');
}

function confirmNextSet(){
  document.getElementById('setendOv').classList.remove('show');
  doNextSet();
}

function manualNextSet(){
  if(state.locked) return;
  showSetEnd(state.score1>=state.score2?1:2);
}

function doNextSet(){
  state.currentSet++;
  state.score1=0; state.score2=0;
  if(state.autoSwap) state.leftPlayer = (state.leftPlayer===1)?2:1;
  state.serve=getStartServer();
  push();
  const lp=state.leftPlayer||1;
  const sName=state.serve===lp?
    (lp===1?state.p1name:state.p2name):
    (lp===1?state.p2name:state.p1name);
  showToast(`SET ${state.currentSet} 시작`);
}

function showWinner(player){
  const lp=state.leftPlayer||1;
  const name=player===1?state.p1name:state.p2name;
  const side=player===lp?'col-left':'col-right';
  document.getElementById('winName').textContent=name;
  document.getElementById('winName').className='win-name '+side;
  document.getElementById('winSub').textContent=`${state.sets1} : ${state.sets2} 경기 종료 🏆`;
  document.getElementById('winOv').classList.add('show');
}

// ── CONTROLS ───────────────────────────────────────────
function setServeByPanel(side){
  const lp=state.leftPlayer||1;
  state.serve = side==='L' ? lp : (lp===1?2:1);
  push();
}
function setFormat(n){ state.format=n; push(); }
function toggleSwap(){
  state.autoSwap=!state.autoSwap; push();
  showToast(state.autoSwap?'자리바꿈 자동 ON ✓':'자리바꿈 OFF');
}
function saveNames(){
  const lp=state.leftPlayer||1;
  const lv=document.getElementById('nameL').value||'선수 1';
  const rv=document.getElementById('nameR').value||'선수 2';
  if(lp===1){state.p1name=lv;state.p2name=rv;}
  else{state.p2name=lv;state.p1name=rv;}
  push();
}
function resetGame(){
  document.getElementById('winOv').classList.remove('show');
  document.getElementById('setendOv').classList.remove('show');
  const prev = { format:state.format, autoSwap:state.autoSwap, p1name:state.p1name, p2name:state.p2name };
  state = defaultState();
  state.format   = prev.format;
  state.autoSwap = prev.autoSwap;
  state.p1name   = prev.p1name;
  state.p2name   = prev.p2name;
  push(); showToast('새 경기 시작 🏓');
}
function toggleHistory(){ document.getElementById('historyPanel').classList.toggle('open'); }

// ── UI ─────────────────────────────────────────────────
function bump(side, isMinus){
  const el=document.getElementById(side==='L'?'scoreL':'scoreR');
  el.classList.remove('bump','minus-bump'); void el.offsetWidth;
  el.classList.add(isMinus?'minus-bump':'bump');
}
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── INIT ───────────────────────────────────────────────
setTimeout(()=>{ if(!dot.classList.contains('online')){ showToast('⚠️ Firebase 연결 확인'); render(); } },3000);
</script>
